<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="index, follow" />
  <title>Dartrak — Privacy Policy / Politique de confidentialité</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0A0A0B;
      color: #E7EAEA;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      padding: 24px;
    }
    .card {
      max-width: 480px;
      width: 100%;
      text-align: center;
      background: #121516;
      border: 1px solid #23282A;
      border-radius: 16px;
      padding: 40px 32px;
    }
    h1 { font-size: 1.6rem; margin: 0 0 8px; }
    p { color: #9BA3A5; margin: 0 0 28px; }
    .links { display: flex; flex-direction: column; gap: 12px; }
    a.btn {
      display: block;
      padding: 14px 20px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      background: #1C9C6B;
      color: #06120D;
      transition: opacity 0.15s ease;
    }
    a.btn:hover { opacity: 0.9; }
    .foot { margin-top: 28px; font-size: 0.8rem; color: #6B7274; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Dartrak</h1>
    <p>Privacy Policy · Politique de confidentialité</p>
    <div class="links">
      <a class="btn" href="legal/privacy-policy.en.html">Read in English</a>
      <a class="btn" href="legal/privacy-policy.fr.html">Lire en français</a>
    </div>
    <p class="foot">Local-first · no ads · no tracking</p>
  </main>
</body>
</html>
